<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vogueabulary — Sign In</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg1:#EDE9F6;--bg2:#D4C6EE;--card:#FFFFFF;--tx:#111827;--mt:#6B7280;--border:#E5E7EB;--ac:#7C3AED;--btn:#111111;--fn:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
body{font-family:var(--fn);min-height:100vh;background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 50%,#E8E0F5 100%);display:flex;align-items:center;justify-content:center;padding:20px}
.card{width:100%;max-width:440px;background:var(--card);border-radius:24px;padding:48px 44px;box-shadow:0 4px 40px rgba(124,58,237,.12);animation:up .45s ease}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.logo-wrap{display:flex;justify-content:center;margin-bottom:24px}
.logo-circle{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#A855F7);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(124,58,237,.35)}
.logo-v{font-size:32px;font-weight:900;color:white;letter-spacing:-1px}
.title{font-size:26px;font-weight:800;color:var(--tx);text-align:center;margin-bottom:8px}
.subtitle{font-size:14px;color:var(--mt);text-align:center;line-height:1.5;margin-bottom:32px}
.tabs{display:flex;margin-bottom:28px;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:10px 0;background:none;border:none;font-size:14px;font-weight:600;color:var(--mt);cursor:pointer;font-family:var(--fn);border-bottom:2px solid transparent;margin-bottom:-1px;transition:.2s}
.tab.on{color:var(--ac);border-bottom-color:var(--ac)}
.form-section{display:none}.form-section.on{display:block;animation:up .3s ease}
.fg{margin-bottom:18px}
.fl-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.fl{font-size:11px;font-weight:700;color:var(--tx);text-transform:uppercase;letter-spacing:.7px}
.forgot{font-size:12px;font-weight:600;color:var(--ac);cursor:pointer}
.forgot:hover{text-decoration:underline}
.input-wrap{position:relative;display:flex;align-items:center}
.input-icon{position:absolute;left:14px;color:var(--mt);font-size:15px;pointer-events:none}
.fi{width:100%;background:#F9FAFB;border:1.5px solid var(--border);border-radius:12px;color:var(--tx);padding:11px 14px 11px 40px;font-size:14px;font-family:var(--fn);outline:none;transition:.2s}
.fi:focus{border-color:var(--ac);background:#fff;box-shadow:0 0 0 3px rgba(124,58,237,.08)}
.fi::placeholder{color:#9CA3AF}
.err{font-size:12px;color:#DC2626;margin-bottom:14px;padding:10px 12px;background:#FEF2F2;border-radius:8px;border-left:3px solid #DC2626;display:none}
.err.show{display:block}
.btn-primary{width:100%;padding:14px;background:var(--btn);border:none;border-radius:12px;color:white;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--fn);transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px}
.btn-primary:hover{background:#1F2937;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--mt);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-google{width:100%;padding:13px 16px;background:white;border:1.5px solid var(--border);border-radius:12px;color:var(--tx);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--fn);transition:.2s;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-google:hover{background:#F9FAFB;border-color:#D1D5DB;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.switch-text{text-align:center;font-size:13px;color:var(--mt);margin-top:20px}
.switch-link{color:var(--ac);font-weight:600;cursor:pointer}
.switch-link:hover{text-decoration:underline}

/* Google One Tap container — hidden by default, shown when GSI loads */
#gsi-container{margin-top:0}

@media(max-width:480px){
  .card{padding:36px 24px}
  .title{font-size:22px}
}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <div class="logo-circle"><div class="logo-v">V</div></div>
  </div>
  <div class="title">Welcome to Your Wardrobe</div>
  <div class="subtitle">Access your garments, generate styles, and review saved recommendations.</div>

  <div class="tabs">
    <button class="tab on" onclick="switchTab('login',this)">Sign In</button>
    <button class="tab"    onclick="switchTab('register',this)">Create Account</button>
  </div>

  <div class="err" id="errMsg"></div>

  <!-- Sign In -->
  <div class="form-section on" id="loginForm">
    <div class="fg">
      <div class="fl-row"><label class="fl">Username or Email</label></div>
      <div class="input-wrap">
        <span class="input-icon">✉</span>
        <input class="fi" id="lUser" placeholder="your@email.com" autocomplete="username">
      </div>
    </div>
    <div class="fg">
      <div class="fl-row">
        <label class="fl">Password</label>
        <span class="forgot">Forgot Password?</span>
      </div>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input class="fi" id="lPass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
    </div>
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">Sign In &nbsp;→</button>

    <div class="divider">or continue with</div>
    <button class="btn-google" onclick="triggerGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.5 30.2 0 24 0 14.8 0 7 5.4 3.2 13.3l7.8 6C12.9 13.2 18 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17z" /><path fill="#FBBC05" d="M11 28.7c-.5-1.4-.7-2.9-.7-4.5s.3-3.1.7-4.5l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.8l8.4-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6 0-11.1-4-12.9-9.4l-8.4 6.1C7 42.5 14.8 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Continue with Google
    </button>

    <!-- Real Google GSI renders here when Client ID is set -->
    <div id="gsi-container"></div>

    <div class="switch-text">New here? <span class="switch-link" onclick="switchTabByName('register')">Create account</span></div>
  </div>

  <!-- Create Account -->
  <div class="form-section" id="registerForm">
    <div class="fg">
      <div class="fl-row"><label class="fl">Your Name</label></div>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input class="fi" id="rName" placeholder="e.g. Samaira">
      </div>
    </div>
    <div class="fg">
      <div class="fl-row"><label class="fl">Username</label></div>
      <div class="input-wrap">
        <span class="input-icon">@</span>
        <input class="fi" id="rUser" placeholder="choose a username">
      </div>
    </div>
    <div class="fg">
      <div class="fl-row"><label class="fl">Password</label></div>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input class="fi" id="rPass" type="password" placeholder="at least 6 characters" onkeydown="if(event.key==='Enter')doRegister()">
      </div>
    </div>
    <button class="btn-primary" id="registerBtn" onclick="doRegister()">Create Account &nbsp;→</button>

    <div class="divider">or sign up with</div>
    <button class="btn-google" onclick="triggerGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.5 30.2 0 24 0 14.8 0 7 5.4 3.2 13.3l7.8 6C12.9 13.2 18 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17z" /><path fill="#FBBC05" d="M11 28.7c-.5-1.4-.7-2.9-.7-4.5s.3-3.1.7-4.5l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.8l8.4-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6 0-11.1-4-12.9-9.4l-8.4 6.1C7 42.5 14.8 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Sign up with Google
    </button>

    <div class="switch-text" style="margin-top:16px">Already have an account? <span class="switch-link" onclick="switchTabByName('login')">Sign in</span></div>
  </div>
</div>

{% if google_client_id %}
<!-- Load Google Identity Services only when Client ID is configured -->
<script src="https://accounts.google.com/gsi/client" async onload="initGSI()"></script>
{% endif %}

<script>
const GOOGLE_CLIENT_ID = "{{ google_client_id|default('') }}";

function initGSI() {
  if (!GOOGLE_CLIENT_ID) return;
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleGoogleCredential,
    auto_select: false,
  });
}

function triggerGoogle() {
  if (!GOOGLE_CLIENT_ID) {
    showErr('Google sign-in is not configured yet. Please use email and password to sign in, or ask the site admin to add the Google Client ID.');
    return;
  }
  google.accounts.id.prompt();
}

async function handleGoogleCredential(response) {
  const res  = await fetch('/api/auth/google', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({credential: response.credential})});
  const data = await res.json();
  if (data.success) { window.location.href = '/'; }
  else { showErr(data.error || 'Google sign-in failed'); }
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.form-section').forEach(f => f.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById(name + 'Form').classList.add('on');
  document.getElementById('errMsg').classList.remove('show');
}
function switchTabByName(name) {
  switchTab(name, document.querySelectorAll('.tab')[name === 'login' ? 0 : 1]);
}
function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg;
  el.classList.add('show');
}

async function doLogin() {
  const btn  = document.getElementById('loginBtn');
  const user = document.getElementById('lUser').value.trim();
  const pass = document.getElementById('lPass').value;
  if (!user || !pass) { showErr('Please fill in both fields'); return; }
  btn.disabled = true; btn.textContent = 'Signing in...';
  const res  = await fetch('/api/login', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username: user, password: pass})});
  const data = await res.json();
  if (data.success) { window.location.href = '/'; }
  else { showErr(data.error || 'Something went wrong'); btn.disabled = false; btn.innerHTML = 'Sign In &nbsp;→'; }
}

async function doRegister() {
  const btn  = document.getElementById('registerBtn');
  const name = document.getElementById('rName').value.trim();
  const user = document.getElementById('rUser').value.trim().replace(/\s+/g, '');
  const pass = document.getElementById('rPass').value;
  if (!name || !user || !pass) { showErr('Please fill in all fields'); return; }
  btn.disabled = true; btn.textContent = 'Creating account...';
  const res  = await fetch('/api/register', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({display_name: name, username: user, password: pass})});
  const data = await res.json();
  if (data.success) { window.location.href = '/'; }
  else { showErr(data.error || 'Something went wrong'); btn.disabled = false; btn.innerHTML = 'Create Account &nbsp;→'; }
}
</script>
</body>
</html>
