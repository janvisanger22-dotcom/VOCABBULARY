<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>vougeabulary — Sign In</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A0A0A;--cd:#1C1C1C;--br:#2A2A2A;--tx:#F0F0F0;--mt:#888;--ac:#C8B89A;--fn:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(200,184,154,.07),transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(200,184,154,.05),transparent 60%);pointer-events:none}
.card{width:100%;max-width:420px;background:var(--cd);border:1px solid var(--br);border-radius:24px;padding:44px 40px;position:relative;animation:up .5s ease}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo{font-size:26px;font-weight:900;background:linear-gradient(135deg,#C8B89A,#F0B429);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px;margin-bottom:6px}
.tagline{font-size:12px;color:var(--mt);margin-bottom:32px}
.tabs{display:flex;gap:0;background:rgba(255,255,255,.04);border-radius:10px;padding:4px;margin-bottom:28px}
.tab{flex:1;padding:8px;border:none;background:transparent;color:var(--mt);font-size:13px;font-weight:600;cursor:pointer;border-radius:7px;transition:.2s;font-family:var(--fn)}
.tab.on{background:var(--br);color:var(--tx)}
.fg{margin-bottom:16px}
.fl{font-size:10px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:6px}
.fi{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--br);border-radius:10px;color:var(--tx);padding:11px 14px;font-size:14px;font-family:var(--fn);outline:none;transition:.2s}
.fi:focus{border-color:var(--ac);background:rgba(200,184,154,.06)}
.fi::placeholder{color:var(--mt)}
.err{font-size:12px;color:#E74C3C;margin-bottom:12px;min-height:16px;display:none}
.err.show{display:block}
.submit-btn{width:100%;padding:13px;background:linear-gradient(135deg,#C8B89A,#F0B429);border:none;border-radius:10px;color:#111;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--fn);transition:.2s;margin-top:4px;letter-spacing:.3px}
.submit-btn:hover{opacity:.9;transform:translateY(-1px)}.submit-btn:active{transform:translateY(0)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--mt);font-size:11px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--br)}
.form-section{display:none}.form-section.on{display:block;animation:up .3s ease}
.welcome-name{font-size:18px;font-weight:700;margin-bottom:2px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">vougeabulary</div>
  <div class="tagline">Your AI fashion stylist, personalised for you</div>

  <div class="tabs">
    <button class="tab on" onclick="switchTab('login',this)">Sign In</button>
    <button class="tab"    onclick="switchTab('register',this)">Create Account</button>
  </div>

  <div class="err" id="errMsg"></div>

  <!-- Login -->
  <div class="form-section on" id="loginForm">
    <div class="fg"><label class="fl">Username</label><input class="fi" id="lUser" placeholder="your username" autocomplete="username"></div>
    <div class="fg"><label class="fl">Password</label><input class="fi" id="lPass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="submit-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="divider">or</div>
    <div style="text-align:center;font-size:12px;color:var(--mt)">New here? <span style="color:var(--ac);cursor:pointer;font-weight:600" onclick="switchTabByName('register')">Create a free account</span></div>
  </div>

  <!-- Register -->
  <div class="form-section" id="registerForm">
    <div class="fg"><label class="fl">Your Name</label><input class="fi" id="rName" placeholder="e.g. Samaira"></div>
    <div class="fg"><label class="fl">Username</label><input class="fi" id="rUser" placeholder="choose a username (no spaces)"></div>
    <div class="fg"><label class="fl">Password</label><input class="fi" id="rPass" type="password" placeholder="at least 6 characters" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()"></div>
    <button class="submit-btn" id="registerBtn" onclick="doRegister()">Create Account</button>
    <div class="divider">or</div>
    <div style="text-align:center;font-size:12px;color:var(--mt)">Already have an account? <span style="color:var(--ac);cursor:pointer;font-weight:600" onclick="switchTabByName('login')">Sign in</span></div>
  </div>
</div>

<script>
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.form-section').forEach(f => f.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById(name + 'Form').classList.add('on');
  document.getElementById('errMsg').classList.remove('show');
}
function switchTabByName(name) {
  const btn = name === 'login'
    ? document.querySelectorAll('.tab')[0]
    : document.querySelectorAll('.tab')[1];
  switchTab(name, btn);
}
function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg;
  el.classList.add('show');
}

async function doLogin() {
  const btn  = document.getElementById('loginBtn');
  const user = document.getElementById('lUser').value.trim();
  const pass = document.getElementById('lPass').value;
  if (!user || !pass) { showErr('Please fill in both fields'); return; }
  btn.disabled = true; btn.textContent = 'Signing in...';
  const res  = await fetch('/api/login', {method:'POST',headers:{'Content-Type':'application/json'},
    body: JSON.stringify({username: user, password: pass})});
  const data = await res.json();
  if (data.success) { window.location.href = '/'; }
  else { showErr(data.error || 'Something went wrong'); btn.disabled=false; btn.textContent='Sign In'; }
}

async function doRegister() {
  const btn  = document.getElementById('registerBtn');
  const name = document.getElementById('rName').value.trim();
  const user = document.getElementById('rUser').value.trim().replace(/\s+/g,'');
  const pass = document.getElementById('rPass').value;
  if (!name || !user || !pass) { showErr('Please fill in all fields'); return; }
  btn.disabled = true; btn.textContent = 'Creating account...';
  const res  = await fetch('/api/register', {method:'POST',headers:{'Content-Type':'application/json'},
    body: JSON.stringify({display_name: name, username: user, password: pass})});
  const data = await res.json();
  if (data.success) { window.location.href = '/'; }
  else { showErr(data.error || 'Something went wrong'); btn.disabled=false; btn.textContent='Create Account'; }
}
</script>
</body>
</html>
